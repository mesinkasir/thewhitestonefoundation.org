backend:
  name: github
  repo: The-Whitestone-Foundation/thewhitestonefoundation.org
  branch: main
  base_url: xxxx # your worker cloudflare

media_folder: "src/static/images"
public_folder: "/images"

collections:
  - name: "metadata"
    label: "Site Metadata"
    files:
      - file: "src/_data/metadata.yaml"
        label: "Site Metadata"
        name: "metadata"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "URL", name: "url", widget: "string" }
          - { label: "Contact Email", name: "contact", widget: "string" }
          - { label: "Support URL", name: "support", widget: "string" }
          - { label: "Main Image", name: "image", widget: "image" }
          - { label: "Language", name: "language", widget: "string" }
          - { label: "Default Language", name: "defaultLanguage", widget: "string" }
          - { label: "Locale", name: "locale", widget: "string" }
          - { label: "Favicon", name: "favicon", widget: "image" }
          - { label: "Noindex", name: "noindex", widget: "boolean", required: false }
          - label: "Brand"
            name: "brand"
            widget: "object"
            required: false
          - label: "Routes"
            name: "routes"
            widget: "object"
            required: false
          - label: "Labels"
            name: "labels"
            widget: "object"
            required: false
          - label: "Symbols"
            name: "symbols"
            widget: "object"
            required: false
          - label: "Team Labels"
            name: "teamLabels"
            widget: "object"
            required: false
          - label: "Images"
            name: "images"
            widget: "object"
            required: false
          - label: "Languages"
            name: "languages"
            widget: "object"
            required: false
          - label: "Head"
            name: "head"
            widget: "object"
            required: false
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Preserve Query Params", name: "preserveQueryParams", widget: "boolean", required: false }
              - label: "Open Graph Image"
                name: "ogImage"
                widget: "object"
                fields:
                  - { label: "URL", name: "url", widget: "image" }
                  - { label: "Width", name: "width", widget: "number", required: false }
                  - { label: "Height", name: "height", widget: "number", required: false }
                  - { label: "Alt Text", name: "alt", widget: "string" }
              - label: "Open Graph"
                name: "openGraph"
                widget: "object"
                fields:
                  - { label: "Type", name: "type", widget: "string" }
              - label: "Twitter"
                name: "twitter"
                widget: "object"
                fields:
                  - { label: "Card", name: "card", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            required: false

  - name: "home"
    label: "Home Page"
    files:
      - file: "src/content/index.md"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "home.njk" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/" }
          - { label: "Hero", name: "hero", widget: "object" }
          - { label: "Mission", name: "mission", widget: "object" }
          - { label: "Images", name: "images", widget: "object" }
          - { label: "Navigation", name: "nav", widget: "list" }
          - { label: "Publications Section", name: "publicationsSection", widget: "object" }
          - { label: "Publications", name: "publications", widget: "list" }
          - { label: "Programs Section", name: "programsSection", widget: "object" }
          - { label: "Programs", name: "programs", widget: "list" }
          - { label: "Team Section", name: "teamSection", widget: "object" }
          - { label: "News Section", name: "newsSection", widget: "object" }
          - { label: "About Section", name: "aboutSection", widget: "object" }
          - { label: "Support Section", name: "supportSection", widget: "object" }
          - { label: "Impact Areas", name: "impactAreas", widget: "list" }
          - { label: "Donation Tiers", name: "tiers", widget: "list" }
          - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "team"
    label: "Active Team"
    folder: "src/content/team"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Description", name: "description", widget: "markdown" }

  - name: "team_alumni"
    label: "Team Alumni"
    folder: "src/content/team/alumni"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string", default: "Alumni" }
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Description", name: "description", widget: "markdown" }

  - name: "pages"
    label: "Static Pages"
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "string", default: "page.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "posts"
    label: "News Posts"
    folder: "src/content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Categories", name: "categories", widget: "list", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Permalink", name: "permalink", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
