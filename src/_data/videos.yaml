list:
  - title: "CRITICAL CONVERSATIONS – “Tenderness,” Or Putting Neoliberalism On The Analyst’s Couch"
    url: "https://www.youtube.com/watch?v=xOUHQjhtp9M"
    description: "Isabella Guanzini, an Italian-Austrian philosopher who can be described as one of the upcoming academic stars of Central Europe, has written a profound and provocative book entitled Tenderness: The Revolution of Soft Power."
  - title: "CRITICAL CONVERSATIONS - Economic Theology And The Indebtedness Of Everyday Life"
    url: "https://www.youtube.com/watch?v=4AraFuX5quM"
    description: "Focuses on credit, debt, and theology with Devin Singh and Joshua Ramey."
  - title: "CRITICAL CONVERSATIONS - Walter Mignolo On \"Decoloniality\""
    url: "https://www.youtube.com/watch?v=h_7_3J9mlYg"
    description: "A “critical conversation” between Victor E. Taylor with Walter Mignolo on his book co-authored with Catherine E. Walsh entitled On Decoloniality."
  - title: "CRITICAL CONVERSATIONS - The Art of Theory: \"Doing Theory\" with Jonathan Fardy"
    url: "https://www.youtube.com/watch?v=_VTyOuEWDzQ"
    description: "Reviewing his recent book Jonathan Fardy addresses questions concerning theory in general, and traditional distinctions between theory and praxis."
  - title: "CRITICAL CONVERSATIONS - 2020 and the Catastrophe of the Global Neoliberal Order"
    url: "https://www.youtube.com/watch?v=y_70tjN9uD0"
    description: "A conversation concerning Carl Raschke’s 2019 book NEOLIBERALISM AND POLITICAL THEOLOGY: FROM KANT TO IDENTITY POLITICS as a lens through which to view the current planetary crisis of both economy and governance."
  - title: "CRITICAL CONVERSATIONS - The Politics of Pause, Struggling Over Speed for Better Futures"
    url: "https://www.youtube.com/watch?v=Z3fe-zt_jhU"
    description: "A monthly series of online seminars involving international scholars on topics of both academic and general relevance and interest."
  - title: "CRITICAL CONVERSATIONS - Subjectivities Since the Sixties"
    url: "https://www.youtube.com/watch?v=oYIXDyeKfFQ"
    description: "Why did mind-altering drugs suddenly become a fashion in the 1960s among radicalized youth, who are now the aging Baby Boomers?"
