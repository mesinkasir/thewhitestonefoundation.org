<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f5ee"/>
      <stop offset="0.58" stop-color="#efe8da"/>
      <stop offset="1" stop-color="#dfe8e4"/>
    </linearGradient>
    <linearGradient id="facetTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7fff9"/>
      <stop offset="1" stop-color="#d8e5dc"/>
    </linearGradient>
    <linearGradient id="facetLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ef"/>
      <stop offset="1" stop-color="#9fb7ab"/>
    </linearGradient>
    <linearGradient id="facetRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8e4dd"/>
      <stop offset="1" stop-color="#789286"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="30%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="0.55" stop-color="#c6dbd1" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#6d8a7f" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#31443d" flood-opacity="0.18"/>
    </filter>
    <clipPath id="stoneClip">
      <polygon points="130,152 350,152 410,235 240,480 70,235"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <circle cx="188" cy="128" r="210" fill="#ffffff" opacity="0.42"/>
  <circle cx="1015" cy="536" r="320" fill="#006d80" opacity="0.06"/>
  <path d="M0 560 C170 500 310 625 515 552 C760 465 850 654 1200 514 L1200 630 L0 630 Z" fill="#006d80" opacity="0.08"/>

  <g filter="url(#softShadow)">
    <g stroke="#f8f5ee" stroke-width="4" stroke-linejoin="round">
      <polygon points="130,152 350,152 310,235 170,235" fill="url(#facetTop)"/>
      <polygon points="130,152 170,235 70,235" fill="#dfeae4"/>
      <polygon points="350,152 410,235 310,235" fill="#c7d7cf"/>
      <polygon points="170,235 310,235 240,480" fill="#b9cec3"/>
      <polygon points="70,235 170,235 240,480" fill="url(#facetLeft)"/>
      <polygon points="310,235 410,235 240,480" fill="url(#facetRight)"/>
      <polygon points="170,235 240,152 310,235" fill="#eef8f1"/>
      <polygon points="240,152 350,152 310,235" fill="#d7e7de"/>
      <polygon points="130,152 240,152 170,235" fill="#eff8f1"/>
    </g>
    <polygon points="130,152 350,152 410,235 240,480 70,235" fill="url(#glow)" opacity="0.95"/>
    <g clip-path="url(#stoneClip)">
      <polyline points="145,212 190,417 240,293 290,417 335,212" fill="none"
        stroke="#f7fff9" stroke-width="14" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>
      <polyline points="145,212 190,417 240,293 290,417 335,212" fill="none"
        stroke="#547166" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" opacity="0.38"/>
    </g>
    <polygon points="130,152 350,152 410,235 240,480 70,235" fill="none"
      stroke="#5b796f" stroke-width="1.6" stroke-linejoin="round" opacity="0.55"/>
  </g>

  <line x1="492" y1="164" x2="492" y2="472" stroke="#006d80" stroke-width="2" opacity="0.22"/>

  <g>
    <text x="530" y="220" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="700"
      letter-spacing="3.5" fill="#006d80">OPEN ACCESS SCHOLARSHIP &#8226; PUBLIC CRITICAL THOUGHT</text>
    <text x="528" y="314" font-family="'Tenor Sans', Georgia, serif" font-size="55" font-weight="400"
      letter-spacing="1.2" fill="#171a1c">The White Stone</text>
    <text x="531" y="370" font-family="Inter, Helvetica, Arial, sans-serif" font-size="35" font-weight="300"
      letter-spacing="7.5" fill="#252b2d">Foundation</text>
    <line x1="532" y1="408" x2="722" y2="408" stroke="#006d80" stroke-width="3"/>
    <text x="530" y="456" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="400"
      fill="#4f5a55">Fostering critical thought for the public interest</text>
  </g>
