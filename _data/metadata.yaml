publication: 
  programs:
  - title: "JCRT"
    image: "/images/wp-content/uploads/2021/08/JCRT-Logo.jpg"
    description: "The Journal of Contemporary Religion and Theory (JCRT) is a peer-reviewed academic journal that explores the intersections of religion, culture, and theory. It publishes original research articles, critical essays, and book reviews that contribute to the understanding of contemporary religious phenomena."
    link_title: "Read Journal"
    link_url: "https://jcrt.org/"
  - title: "The New Polis"
    image: "/images/wp-content/uploads/2021/08/New-Polis-logo.png"
    description: "The New Polis is a platform for critical engagement with contemporary issues at the intersection of religion, culture, and theory."
    link_title: "Explore"
    link_url: "https://thenewpolis.com/"
  - title: "Journal New Polish"
    image: "/images/the-new-polis2.png"
    description: "The Journal of New Polish Studies is a peer-reviewed academic journal that publishes research on the culture, history, and society of Poland and the Polish diaspora."
    link_title: "Join Now"
    link_url: "https://journal.thenewpolis.com/"
  - title: "Esthesis"
    image: "/images/esthesis-logo-393x320-clean.png"
    description: "Esthesis is a digital publication that explores the intersections of art, culture, and theory."
    link_title: "Learn More"
    link_url: "https://esthesis.org/"

