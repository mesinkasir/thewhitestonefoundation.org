active:
  - name: "Victor Taylor"
    role: "President"
    photo: "/images/wp-content/uploads/2021/08/VTaylor-1.jpg"
    description: |
      Victor E. Taylor (Ph.D., Syracuse University) is a nationally recognized humanities author and scholar. He has held several senior administrative leadership positions in high education. Currently, he serves as the president of the Whitestone Foundation.

      He is the executive editor for the *Journal of Cultural and Religious Theory* and editor of two book series with Parlor Press: *Emerging Conversations in the Global Humanities* and *Critical Issues in Higher Ed Leadership*. His current research includes a volume entitled *Global Kafkas* co-edited with Sander L. Gilman.

      He has published widely in the humanities and is the author of *Para/Inquiry: Postmodern Religion and Culture* (Routledge 2000), The *Religious Prayed, The Profane Swear* (Pen Mark Press 2002/ Second edition, 2012), *Religion After Postmodernism* (The University of Virginia Press 2008), and *Christianity, Plasticity, and Spectral Heritages* (Palgrave MacMillan 2017). He is the co-editor of *Postmodernism: Critical Concepts* (Routledge 1998) , *The Routledge Encyclopedia of Postmodernism*, (2000: Spanish 2002, Russian 2003), *Jean-François Lyotard: Critical Assessment,* vols. I-III, (Routledge 2005), *Conversations in Cultural Rhetoric and Composition*, (Davies, 2009), *Conversations in Cultural and Religious Theory* (Davies 2013) and *Divisible Derridas,* (Davies 2017).

      At York College of Pennsylvania, he was the inaugural Senior Academic Officer of the Division of Graduate Studies and Professional Programs, Director of the Institute for Civic Arts and Humanities, Chair of the English and humanities department, Interim Dean of the Graham School of Business, and Director of the Presidential Research Honors Program. He was the coordinator for the literary studies program and the humanities program, the coordinator for "disciplinary perspectives" in general education (Gen Next), and as the principal investigator for CTL and Great to Great grants on the urban and civic humanities.

      He was a research associate at The Johns Hopkins University and has held similar appointments at UCLA, University of Pennsylvania, and UC, Irvine. In 2015 he completed Harvard University's MDP in higher education leadership.

  - name: "Carl Raschke"
    role: "Secretary-Treasurer"
    photo: "/images/wp-content/uploads/2021/08/Carl-Raschke.jpg"
    description: |
      Carl Raschke is Secretary-Treasurer of The Whitestone Foundation as well as Senior Editor for *The Journal for Cultural and Religious Theory*.

      He is Professor of Philosophy of Religion and Director of the Master of Arts Program in Religious Studies at the University of Denver.


  - name: "Gary Bedford"
    role: "Board Member"
    photo: "/images/gary-bedford.jpg"
    description: |
      **Gary Bedford,** M.A., Director, and Founder,[*The Wild Globalization Project*](https://www.wildglobalization.com)

      *The Wild Globalization Project *("WG") engages "civilization" -- *rather than as a recent 3-5,000-year "written history" phenomenon leading to "modernity"* -- but rather as *Homo sapien' s* still ongoing 300,000-year "universal drama" and presence on planet Earth. *WG* investigates our present 21^st^ century condition from multiple, simultaneously occurring "factors": *Ecology, Demographics and Culture, Technology, Economy, Governance, and Wealth*. "Wild" implies that these factors respond as "quantumly entangled" complexities -- *the Internet and the "world-wide-web" offer salient examples --* which resist complete measure, understanding, and therefore predictability and control.

      Why re-envision civilization? *WG* asks if we respect and fully appreciate this "wild," entangled circumstance? Is 21^st^ century civilization not at a critical "turning point" -- resurgent global warfare and pandemics; "great" financial crises; human numbers surging from four to eight billion, global economies expanding from $4B to $100B; the Living Planet Index warning that Nature's other vertebrate and invertebrate creatures may be in severe stress or decline? How can civilization confront and transcend bitter partisanships and vicious cultural hatreds and competitions? Can we re-envision our common birthrights, and our deeper, universal human heritage? Can we preserve and replenish our vital natural world?

      *WG *considers three unique human abilities: a free desire to know ("Knowledge"); a free will to survive and then thrive ("Will"); and an altruistic and moral desire to care for our communities and planet Earth ("Love"). Rather than viewing human economy as originating from "labor," "commodities," or "capital," *W**G  *investigates "free and passionate knowledge deployed to practical, applied innovation and invention" as the engine of what *WG* calls the "free human creative-destructive value response." Humans no longer merely "evolve," but rather *emerge* suddenly, shockingly, and unpredictably. The dinosaurs dominated Earth in 20 million years -- *Homo sapien* did it in 50,000. Kitty Hawk to the Moon in 7 decades; the Manhattan Project opens the atomic age in three years. And now AI?

      *WG *asks how or if the human psyche has kept pace with the sudden and shocking transformation of societal orders which have "scaled" from small-group hundreds, to then thousands, and now millions and billions on the momentums of transformative technologies and cultural achievements? These creative-destructive momentums now position humanity as the wildest risk to both itself and the planet: "We once took stones and made stone tools; we now take stones and make nuclear weapons."

      Gary's personal "global" journey began with an American Field Service ("AFS") scholarship year abroad (Tromsø, Norway, 1970-71). He then participated in a unique world tour led by religious studies scholar, Huston Smith, (Syracuse University, International School of America Honors Program, 1976-1977). Over an academic year, the group lived with local families while studying with resident scholars and leaders of religious and cultural communities of Islam (Fez, Morocco, Isfahan, Iran), Judeo-Christianity (Israel), Hinduism (Benares, India), and Buddhism (India, Nepal, Sri Lanka, Hong Kong, Japan).

      Bedford's research has been influenced by various elite thought-leaders, including Whitestone's original founders, Charles Winquist and Carl Raschke, as well as archetypal psychologist James Hillman (U. Dallas 1979), and the aforementioned Huston Smith.

      Bedford has published in the American Academy of Religion as well as the Journal for Culture and Religious Theory.

      In his private life, Gary enjoys alpine skiing, mountain biking, hot yoga, and music composition. He resides with Anna, with whom he has celebrated 45 years of marriage, in Boulder County, Colorado.

  - name: "Adam DJ Brett"
    role: "Special Projects Editor"
    photo: "/images/adamdjbrett-sm.jpg"
    description: |
      Adam DJ Brett is Special Projects Editor for Whitestone Publications.

      He earned a Ph.D. in religion at Syracuse University whose work explores how Christianity, colonialism, and culture have become interwoven in North America. Beyond academia, he works with the American Indian Law Alliance and Indigenous Values Initiative in support of Indigenous sovereignty, human rights, and social justice. When he is not reading or writing he is coding, playing dungeons & dragons, and watching lacrosse.

